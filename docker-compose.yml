version: '3.8'

services:
  aerotryout-app:
    container_name: aerotryout_production
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: always
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
